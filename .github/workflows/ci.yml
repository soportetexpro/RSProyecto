name: CI — RSProyecto Texpro

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'modulo/**'
  pull_request:
    branches:
      - main

# Migración a Node.js 24 (obligatorio desde junio 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Format check
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Formato
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Instalar dependencias
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No hay package.json aún — saltando instalación"
          fi

      - name: Ejecutar ESLint
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "Script lint no configurado aún — saltando"
          fi

  # ─────────────────────────────────────────
  # JOB 2: Tests unitarios
  # ─────────────────────────────────────────
  test:
    name: 🧪 Tests Unitarios
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Instalar dependencias
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No hay package.json aún — saltando instalación"
          fi

      - name: Ejecutar tests con cobertura
        run: |
          if [ -f package.json ] && grep -q '"test:coverage"' package.json; then
            npm run test:coverage
          else
            echo "Tests no configurados aún — saltando"
          fi

      - name: Subir reporte de cobertura
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Build check
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Instalar dependencias
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No hay package.json aún — saltando instalación"
          fi

      - name: Ejecutar build
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "Script build no configurado aún — saltando"
          fi

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          if-no-files-found: ignore
          retention-days: 7
