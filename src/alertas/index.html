<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texpro — Alertas y Recordatorios</title>
  <link rel="icon" type="image/jpg" href="../assets/images/Isotipo-TEXPRO_fondo_blanco.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/tokens.css?v=1.0.0" />
  <link rel="stylesheet" href="alertas.css?v=1.0.0" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/images/Isotipo-TEXPRO_fondo_blanco.png" alt="Texpro" class="sidebar-logo" onerror="this.style.display='none'" />
      <span class="sidebar-brand">TEXPRO</span>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Colapsar menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <span class="user-name" id="userName">Cargando...</span>
          <span class="user-area" id="userArea"></span>
        </div>
      </div>
      <button class="btn-logout" id="btnLogout" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        <span class="btn-logout-text">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-wrapper" id="mainWrapper">
    <header class="main-header">
      <div class="header-left">
        <button class="header-menu-btn" id="headerMenuBtn" aria-label="Menú móvil">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <h1 class="header-title">Alertas y Recordatorios</h1>
      </div>
      <div class="header-right">
        <span class="header-date" id="headerDate"></span>
        <div class="header-user-chip">
          <div class="chip-avatar" id="chipAvatar">?</div>
          <span class="chip-name" id="chipName">...</span>
        </div>
      </div>
    </header>

    <main class="main-content">

      <!-- BARRA SUPERIOR -->
      <div class="alertas-topbar">
        <div class="alertas-topbar-left">
          <h2 class="alertas-page-titulo">🔔 Mis Alertas</h2>
          <span class="alertas-page-sub">Gestiona tus recordatorios personales y grupales</span>
        </div>
        <button class="btn-nueva-alerta" id="btnNuevaAlerta">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva Alerta
        </button>
      </div>

      <!-- FILTROS -->
      <div class="alertas-filtros">
        <button class="filtro-btn filtro-btn--active" data-filtro="todas">Todas</button>
        <button class="filtro-btn" data-filtro="activas">Activas</button>
        <button class="filtro-btn" data-filtro="proximas">⚠️ Próximas a vencer</button>
        <button class="filtro-btn" data-filtro="completadas">✅ Completadas</button>
        <button class="filtro-btn" data-filtro="grupales">👥 Grupales</button>
      </div>

      <!-- GRID DE ALERTAS -->
      <div class="alertas-grid" id="alertasGrid">
        <div class="alertas-loading" id="alertasLoading">
          <div class="alerta-spinner"></div>
          <span>Cargando alertas...</span>
        </div>
      </div>

    </main>
  </div>

  <!-- ══ MODAL CREAR / EDITAR ALERTA ══════════════════════════════ -->
  <div class="alerta-modal-overlay" id="modalAlertaOverlay" aria-hidden="true">
    <div class="alerta-modal">
      <div class="alerta-modal-header">
        <h2 class="alerta-modal-titulo" id="modalAlertaTitulo">Nueva Alerta</h2>
        <button class="alerta-modal-cerrar" id="btnCerrarModal" aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form class="alerta-form" id="formAlerta" novalidate>
        <input type="hidden" id="editandoId" value="" />

        <div class="form-group">
          <label class="form-label" for="fTitulo">Título <span class="req">*</span></label>
          <input class="form-input" type="text" id="fTitulo" maxlength="160" placeholder="Ej: Renovar contrato proveedor X" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="fDescripcion">Descripción</label>
          <textarea class="form-input form-textarea" id="fDescripcion" rows="3" placeholder="Detalle opcional de la tarea o recordatorio..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fTipo">Tipo <span class="req">*</span></label>
            <select class="form-input" id="fTipo">
              <option value="personal">Personal (solo yo)</option>
              <option value="grupal">Grupal (compartida)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="fFechaVence">Fecha límite <span class="req">*</span></label>
            <input class="form-input" type="date" id="fFechaVence" required />
          </div>
        </div>

        <!-- Sección destinatarios — solo visible si tipo=grupal -->
        <div class="form-group" id="seccionDestinatarios" style="display:none">
          <label class="form-label">Compartir con <span class="form-hint">(selecciona uno o más usuarios)</span></label>
          <div class="dest-lista" id="listaDestinatarios">
            <span class="dest-loading">Cargando usuarios...</span>
          </div>
        </div>

        <div class="alerta-form-footer">
          <button type="button" class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
          <button type="submit" class="btn-guardar" id="btnGuardarAlerta">Guardar Alerta</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ══ POPUP DE RECORDATORIO EN LOGIN ════════════════════════════ -->
  <div class="recordatorio-overlay" id="recordatorioOverlay" aria-hidden="true">
    <div class="recordatorio-panel">
      <div class="recordatorio-header">
        <span class="recordatorio-icono">🔔</span>
        <div>
          <h3 class="recordatorio-titulo">Recordatorios pendientes</h3>
          <p class="recordatorio-sub">Tienes alertas que vencen pronto</p>
        </div>
        <button class="recordatorio-cerrar" id="btnCerrarRecordatorio" aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <ul class="recordatorio-lista" id="recordatorioLista"></ul>
      <div class="recordatorio-footer">
        <button class="btn-ir-alertas" id="btnIrAlertas">Ver todas mis alertas</button>
      </div>
    </div>
  </div>

  <script src="alertas.js?v=1.0.0"></script>
  <script src="../assets/js/inactividad.js?v=1.0.0"></script>
</body>
</html>
