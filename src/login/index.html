<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texpro — Iniciar Sesión</title>
  <link rel="icon" type="image/png" href="../assets/images/Isotipo-TEXPRO.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/tokens.css?v=2.1.0" />
  <link rel="stylesheet" href="login.css?v=2.1.0" />
</head>
<body>

  <div class="login-wrapper">

    <!-- Panel izquierdo — branding -->
    <div class="login-brand">
      <div class="brand-content">
        <img
          src="../assets/images/Isotipo-TEXPRO_fondo_blanco.png"
          alt="Texpro Logo"
          class="brand-logo"
          onerror="this.style.display='none'; document.getElementById('brand-fallback').style.display='flex';"
        />
        <div id="brand-fallback" class="brand-fallback" style="display:none;">
          <div class="brand-isotipo">⚗️</div>
          <h1 class="brand-name">TEXPRO</h1>
          <p class="brand-tagline">Productos Químicos y Tratamiento de Aguas</p>
        </div>
        <div class="brand-footer">
          <span class="brand-cert">ISO 9001:2015 · ISP · CITUC</span>
        </div>
      </div>
    </div>

    <!-- Panel derecho — formulario -->
    <div class="login-panel">
      <div class="login-card">

        <!-- Logo pequeño para mobile -->
        <div class="login-logo-mobile">
          <img
            src="../assets/images/Isotipo-TEXPRO_fondo_blanco.png"
            alt="Texpro"
            class="login-isotipo-mobile"
          />
        </div>

        <div class="login-header">
          <h2 class="login-title">Bienvenido</h2>
          <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <form class="login-form" id="loginForm" novalidate>

          <!-- Campo email -->
          <div class="form-group" id="group-usuario">
            <label class="form-label" for="usuario">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              Correo electrónico
            </label>
            <input
              type="email"
              id="usuario"
              name="usuario"
              class="form-input"
              placeholder="tucorreo@texpro.cl"
              autocomplete="email"
              required
            />
            <span class="form-error" id="error-usuario"></span>
          </div>

          <!-- Campo contraseña -->
          <div class="form-group" id="group-password">
            <label class="form-label" for="password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Contraseña
            </label>
            <div class="input-password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                required
              />
              <button type="button" class="btn-toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              </button>
            </div>
            <span class="form-error" id="error-password"></span>
          </div>

          <!-- Recordar sesión -->
          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="recordar" name="recordar" class="checkbox-input" />
              <span class="checkbox-custom"></span>
              Recordar sesión
            </label>
            <a href="../recuperar-password/index.html" class="link-forgot">¿Olvidaste tu contraseña?</a>
          </div>

          <!-- Mensaje de error general -->
          <div class="alert-error" id="alertError" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
            <span id="alertErrorMsg">Usuario o contraseña incorrectos.</span>
          </div>

          <!-- Botón submit -->
          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">Iniciar Sesión</span>
            <span class="btn-loader" id="btnLoader" style="display:none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              Verificando...
            </span>
          </button>

        </form>

        <div class="login-footer">
          <p>Sistema de Gestión Interna &mdash; <strong>Texpro</strong></p>
          <p class="version">v2.1.0</p>
        </div>

      </div>
    </div>

  </div>

  <script src="login.js?v=2.1.0"></script>
</body>
</html>
