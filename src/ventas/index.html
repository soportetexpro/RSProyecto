<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texpro — Ventas</title>
  <link rel="icon" type="image/jpg" href="../assets/images/Isotipo-TEXPRO_fondo_blanco.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/tokens.css" />
  <link rel="stylesheet" href="ventas.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/images/Isotipo-TEXPRO_fondo_blanco.png" alt="Texpro" class="sidebar-logo" onerror="this.style.display='none'" />
      <span class="sidebar-brand">TEXPRO</span>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Colapsar menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <span class="user-name" id="userName">Cargando...</span>
          <span class="user-area" id="userArea"></span>
        </div>
      </div>
      <button class="btn-logout" id="btnLogout" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        <span class="btn-logout-text">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-wrapper" id="mainWrapper">
    <header class="main-header">
      <div class="header-left">
        <button class="header-menu-btn" id="headerMenuBtn" aria-label="Menú móvil">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <h1 class="header-title">Ventas</h1>
      </div>
      <div class="header-right">
        <span class="header-date" id="headerDate"></span>
        <div class="header-user-chip">
          <div class="chip-avatar" id="chipAvatar">?</div>
          <span class="chip-name" id="chipName">...</span>
        </div>
      </div>
    </header>
    <main class="main-content" id="mainContent">
      <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
        <p>Cargando módulo de ventas...</p>
      </div>
    </main>
    <footer class="main-footer">
      <span>Texpro Productos Químicos y Tratamiento de Aguas</span>
      <span class="footer-version">v1.0.0</span>
    </footer>
  </div>

  <div class="notif-toast-container" id="notifToastContainer" aria-live="polite" aria-atomic="false"></div>

  <script src="ventas.js"></script>
  <script src="../assets/js/inactividad.js"></script>
</body>
</html>
